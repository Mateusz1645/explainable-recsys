name: CI-CD Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: pytest -q

  build_image:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/explainable-recsys-demo:latest
            ghcr.io/${{ github.repository }}/explainable-recsys-demo:${{ github.sha }}

  deploy_render:
    needs: build_image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && secrets.RENDER_DEPLOY_HOOK_URL != ''
    steps:
      - run: curl --fail --show-error --silent -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"